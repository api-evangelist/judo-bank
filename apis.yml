apis:
- aid: judo-bank:judo-bank-cdr-product-reference-data-api
  name: Judo Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking Products
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.judo.bank/open-banking/
  baseURL: https://public.open.judo.bank/cds-au/v1
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_banking_get-products
    type: APIReference
  - url: openapi/judo-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference
    Data API for Judo Bank, served at https://public.open.judo.bank/cds-au/v1 and
    conforming to the DSB Consumer Data Standards (CDS) Banking API. The GET
    /banking/products endpoint (confirmed live, HTTP 200, x-v 3, 12 products across
    categories including residential mortgages and term deposits) returns the bank's
    publicly available product catalogue with paginated metadata; GET
    /banking/products/{productId} returns full product detail. No authentication or
    API key is required for this product-reference surface.
