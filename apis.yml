name: Judo Bank
kind: company
description: Judo Bank (Judo Capital Holdings Ltd) is an Australian challenger bank
  founded in 2016 and headquartered in Melbourne, purpose-built to serve small and
  medium-sized enterprises (SMEs) with relationship-led business lending alongside
  personal and business term deposits. It was the first new domestically-owned bank
  in decades to be granted a full, unrestricted authorised deposit-taking institution
  (ADI) licence by APRA, in April 2019, and has been publicly listed on the Australian
  Securities Exchange (ticker ASX JDO) since November 2021 - it is a for-profit, shareholder-owned
  bank, not a customer-owned mutual. As a designated ADI and data holder under Australia's
  Consumer Data Right (CDR / Open Banking) regime, Judo Bank exposes a public,
  unauthenticated Product Reference Data (PRD) API conforming to the Data Standards
  Body (DSB) Consumer Data Standards, while authenticated consumer-data sharing is
  governed by the accredited data recipient (ADR) model rather than an open self-serve
  developer program.
