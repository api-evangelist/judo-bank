  name: Judo Bank CDR Payees API
  tags:
  - CDR
  - Open Banking
  - Payees
  - Banking Data
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.judo.bank/open-banking/
  baseURL: https://public.open.judo.bank/cds-au/v1/banking/payees
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_banking_get-payees
    type: APIReference
  - url: openapi/judo-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right (CDR) Payees surface for Judo
    Bank, part of the shared DSB Consumer Data Standards (CDS) Banking API v1.36.0.
    Covers Get Payees (GET /banking/payees) and Get Payee Detail (GET
    /banking/payees/{payeeId}), returning the saved payees a consumer has configured.
    These operations are only accessible through the CDR accredited-data-recipient
    (ADR) model after the consumer authorizes an accredited recipient via the OAuth2
    / OIDC + FAPI authorization flow; no open self-serve developer key is offered.
