  name: Judo Bank CDR Transactions API
  tags:
  - CDR
  - Open Banking
  - Transactions
  - Banking Data
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.judo.bank/open-banking/
  baseURL: https://public.open.judo.bank/cds-au/v1/banking/accounts
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_banking_get-transactions-for-account
    type: APIReference
  - url: openapi/judo-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right (CDR) Transactions surface for
    Judo Bank, part of the shared DSB Consumer Data Standards (CDS) Banking API
    v1.36.0. Covers Get Transactions For Account (GET
    /banking/accounts/{accountId}/transactions, with date, amount and text filters
    plus pagination) and Get Transaction Detail (GET
    /banking/accounts/{accountId}/transactions/{transactionId}). These operations
    return a consumer's own transaction history and are only accessible through the
    CDR accredited-data-recipient (ADR) model after the consumer authorizes an
    accredited recipient via the OAuth2 / OIDC + FAPI authorization flow; no open
    self-serve developer key is offered.
- aid: judo-bank:judo-bank-cdr-direct-debits-scheduled-payments-api
  name: Judo Bank CDR Direct Debits & Scheduled Payments API
  tags:
  - CDR
  - Open Banking
  - Direct Debits
  - Scheduled Payments
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.judo.bank/open-banking/
  baseURL: https://public.open.judo.bank/cds-au/v1/banking/accounts
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_banking_get-direct-debits-for-account
    type: APIReference
  - url: openapi/judo-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right (CDR) Direct Debits and
    Scheduled Payments surface for Judo Bank, part of the shared DSB Consumer Data
    Standards (CDS) Banking API v1.36.0. Covers Get Direct Debits For Account (GET
    /banking/accounts/{accountId}/direct-debits), Get Bulk Direct Debits (GET
    /banking/accounts/direct-debits), Get Scheduled Payments For Account (GET
    /banking/accounts/{accountId}/payments/scheduled) and Get Scheduled Payments Bulk
    (GET /banking/payments/scheduled), along with the related payment-plans
    operations. These read-only operations expose a consumer's recurring debit and
    scheduled-payment arrangements and are only accessible through the CDR
    accredited-data-recipient (ADR) model after the consumer authorizes an accredited
    recipient via the OAuth2 / OIDC + FAPI authorization flow.
