apis:
- aid: judo-bank:judo-bank-cdr-product-reference-data-api
  name: Judo Bank CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking Products
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.judo.bank/open-banking/
  baseURL: https://public.open.judo.bank/cds-au/v1/banking/products
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_banking_get-products
    type: APIReference
  - url: openapi/judo-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right (CDR) Product Reference
    Data API for Judo Bank, served at https://public.open.judo.bank/cds-au/v1 and
    conforming to the DSB Consumer Data Standards (CDS) Banking API v1.36.0. The GET
    /banking/products endpoint (confirmed live, HTTP 200, x-v 3) returns the bank's
    publicly available product catalogue with paginated metadata; GET
    /banking/products/{productId} returns full product detail (confirmed live, HTTP
    200). No authentication or API key is required for this product-reference surface
    - it is the only CDR banking operation Judo exposes without accreditation.
- aid: judo-bank:judo-bank-cdr-accounts-balances-api
  name: Judo Bank CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.judo.bank/open-banking/
  baseURL: https://public.open.judo.bank/cds-au/v1/banking/accounts
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_banking_get-accounts
    type: APIReference
  - url: openapi/judo-bank-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right (CDR) Accounts and Balances
    surface for Judo Bank, part of the shared DSB Consumer Data Standards (CDS)
    Banking API v1.36.0 that every Australian ADI data holder must implement. Covers
    Get Accounts (GET /banking/accounts), Get Bulk Balances (GET
    /banking/accounts/balances), Get Balances For Specific Accounts (POST
    /banking/accounts/balances), Get Account Balance (GET
    /banking/accounts/{accountId}/balance) and Get Account Detail (GET
    /banking/accounts/{accountId}). Unlike the public Product Reference Data surface,
    these operations return a consumer's own account data and are only accessible
    through the CDR accredited-data-recipient (ADR) model - the consumer authorizes
    an accredited recipient via the OAuth2 / OIDC + FAPI authorization flow; there is
    no open self-serve developer key. A probe of GET /banking/accounts without
    authorization returned HTTP 404 on the public host, consistent with the endpoint
    being gated behind the authorized data-holder flow rather than the public origin.
